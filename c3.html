<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCIEX - Cadastrar uma conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Reset de estilos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Baloo 2', cursive, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #590623;
        }

        /* Container que divide a tela em duas metades */
        .container {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        /* =======================================================
           LADO ESQUERDO: Logo, Nome da Marca e Slogan
           ======================================================= */
        .left-side {
            flex: 1;
            background-color: #FAF1D6; /* Cor de fundo bege clara */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 15px;
        }

        .logo-img {
            max-width: 220px;
            height: auto;
            object-fit: contain;
        }

        .brand-name {
            color: #590623; /* Tom de vinho escuro */
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            line-height: 1;
            margin-bottom: 25px;
        }

        .tagline {
            color: #000000;
            font-size: 1.6rem;
            font-weight: 800;
            max-width: 320px;
            line-height: 1.2;
        }

        /* =======================================================
           LADO DIREITO: Título e Card do Formulário
           ======================================================= */
        .right-side {
            flex: 1;
            background-color: #590623; /* Cor de fundo vinho */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .page-title {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 500;
            margin-bottom: 25px;
        }

        /* Caixa interna bege onde ficam os inputs */
        .form-card {
            background-color: #FAF1D6;
            border-radius: 20px;
            padding: 40px 45px;
            width: 100%;
            max-width: 490px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .form-subtitle {
            color: #D27828; /* Cor alaranjada */
            font-size: 1.6rem;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            color: #590623;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        /* Posicionamento dos ícones dentro das caixas de texto */
        .input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-container i {
            position: absolute;
            color: #8A8A8A;
            font-size: 1.1rem;
        }

        .input-container i.left-icon {
            left: 14px;
        }

        .input-container i.right-icon {
            right: 14px;
            cursor: pointer;
        }

        .form-input {
            width: 100%;
            padding: 9px 14px;
            padding-left: 42px; /* Espaço para o ícone da esquerda */
            border: 1px solid #CCCCCC;
            border-radius: 8px;
            font-size: 1.1rem;
            color: #333333;
            background-color: #FFFFFF;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        /* Remove o recuo extra nos inputs que não possuem ícone à direita */
        .form-input-has-right-icon {
            padding-right: 42px;
        }

        .form-input::placeholder {
            color: #A6A6A6;
        }

        .form-input:focus {
            border-color: #590623;
            box-shadow: 0 0 0 1px #590623;
        }

        /* Botão Cadastrar */
        .btn-submit {
            width: 100%;
            background-color: #590623;
            color: #ffffff;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 15px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #420419;
        }

        /* Links do rodapé */
        .login-footer {
            color: #590623;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .login-link {
            color: #D27828;
            text-decoration: none;
        }

        .login-link:hover {
            text-decoration: underline;
        }

        /* Design Responsivo para Celulares */
        @media (max-width: 850px) {
            .container {
                flex-direction: column;
            }
            .left-side {
                padding: 60px 20px 40px 20px;
            }
            .right-side {
                padding: 20px 20px 60px 20px;
            }
            .brand-name {
                font-size: 3rem;
                margin-bottom: 15px;
            }
            .page-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="left-side">
            <div class="logo-container">
                <img src="c:\Users\lilia rocha\Downloads\logo.png" alt="Logo SOCIEX" class="logo-img">
            </div>
            <h1 class="brand-name">SOCIEX</h1>
            <p class="tagline">Faça do seu problema uma oportunidade!</p>
        </div>

        <div class="right-side">
            <h2 class="page-title">Cadastrar uma conta</h2>
            
            <div class="form-card">
                <p class="form-subtitle">Preencha os campos abaixo e crie uma nova conta</p>
                
                <form>
                    <div class="form-group">
                        <label class="form-label">Informe seu e-mail</label>
                        <div class="input-container">
                            <i class="fa-regular fa-envelope left-icon"></i>
                            <input type="email" class="form-input" placeholder="E-mail" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Informe sua senha</label>
                        <div class="input-container">
                            <i class="fa-solid fa-lock left-icon"></i>
                            <input type="password" class="form-input form-input-has-right-icon" placeholder="Senha" required>
                            <i class="fa-regular fa-eye-slash right-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirme sua senha</label>
                        <div class="input-container">
                            <i class="fa-solid fa-lock left-icon"></i>
                            <input type="password" class="form-input form-input-has-right-icon" placeholder="Senha" required>
                            <i class="fa-regular fa-eye-slash right-icon"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Cadastrar</button>
                </form>

                <p class="login-footer">Já possui uma conta? <a href="#" class="login-link">Faça Login</a></p>
            </div>
        </div>

    </div>

</body>
</html>
